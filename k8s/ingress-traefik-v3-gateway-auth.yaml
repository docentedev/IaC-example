# Ingress actualizado para la Fase 6 del laboratorio.
# Extiende la Fase 5 agregando el auth-service (JWT/PostgreSQL)
# expuesto en /auth.
#
# Para aplicar este ingress (reemplaza al anterior):
#   kubectl apply -f k8s/ingress-traefik-v3-gateway-auth.yaml
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservicios-ingress
  namespace: microservicios
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: micro.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: krakend
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: krakend
                port:
                  number: 8080
          # Auth service: login, register y JWT bajo /auth
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3002
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-react
                port:
                  number: 80
