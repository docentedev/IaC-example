# Deployment del microservicio de autenticación.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: microservicios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            # Conexión a PostgreSQL (DNS interno de Kubernetes).
            - name: DB_HOST
              value: auth-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: DB_PASSWORD
            # Clave para firmar/verificar los JWT.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES
              value: "24h"
---
# Service ClusterIP expuesto al Ingress en el puerto 3002.
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: microservicios
spec:
  selector:
    app: auth-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP
