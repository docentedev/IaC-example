# PersistentVolumeClaim para datos de PostgreSQL del auth-service.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auth-postgres-pvc
  namespace: microservicios
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# Deployment de PostgreSQL para auth-service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-postgres
  namespace: microservicios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-postgres
  template:
    metadata:
      labels:
        app: auth-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: DB_NAME
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: auth-postgres-pvc
---
# Service ClusterIP para que auth-service pueda conectarse a postgres internamente.
apiVersion: v1
kind: Service
metadata:
  name: auth-postgres
  namespace: microservicios
spec:
  selector:
    app: auth-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
