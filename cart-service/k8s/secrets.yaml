---
# Secretos del cart-service y su base de datos
# Valores en Base64:  echo -n 'valor' | base64
#   cart      → Y2FydA==
#   cart123   → Y2FydDEyMw==
#   cartdb    → Y2FydGRi
#   jwt-secret-laboratorio-duoc-2026 → and so on
apiVersion: v1
kind: Secret
metadata:
  name: cart-secrets
  namespace: microservicios
type: Opaque
stringData:          # stringData acepta texto plano, k8s lo codifica en base64 automáticamente
  DB_USER:     "cart"
  DB_PASSWORD: "cart123"
  DB_NAME:     "cartdb"
  DB_HOST:     "cart-postgres"
