server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Para React Router: cualquier path que no sea un archivo real
    # retorna index.html y React maneja el routing del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets con hash en el nombre (JS/CSS generados por Vite).
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
