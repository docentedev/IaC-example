# ConfigMap v3 (opcional): agrega Circuit Breaker a todos los backends de la v2.
# Es incremental: no reemplaza ejercicios previos, se aplica al final.
# Para aplicar:
#   kubectl apply -f krakend/k8s/krakend-config-v3-circuit-breaker.yaml
#   kubectl rollout restart deployment krakend -n microservicios
apiVersion: v1
kind: ConfigMap
metadata:
  name: krakend-config
  namespace: microservicios
data:
  krakend.json: |
    {
      "$schema": "https://www.krakend.io/schema/v3.json",
      "version": 3,
      "name": "API Gateway - Microservicios DuocUC (Circuit Breaker)",
      "timeout": "3000ms",
      "cache_ttl": "300s",
      "output_encoding": "json",
      "endpoints": [
        {
          "endpoint": "/api/products",
          "method": "GET",
          "output_encoding": "no-op",
          "backend": [
            {
              "url_pattern": "/api/products",
              "encoding": "no-op",
              "host": ["http://product-service:4020"],
              "method": "GET",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-products-list",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/api/products/{id}",
          "method": "GET",
          "output_encoding": "json",
          "backend": [
            {
              "url_pattern": "/api/products/{id}",
              "encoding": "json",
              "host": ["http://product-service:4020"],
              "method": "GET",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-products-id",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/api/users",
          "method": "GET",
          "output_encoding": "no-op",
          "backend": [
            {
              "url_pattern": "/api/users",
              "encoding": "no-op",
              "host": ["http://user-service:4021"],
              "method": "GET",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-users-list",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/api/users/{id}",
          "method": "GET",
          "output_encoding": "json",
          "backend": [
            {
              "url_pattern": "/api/users/{id}",
              "encoding": "json",
              "host": ["http://user-service:4021"],
              "method": "GET",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-users-id",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/api/users",
          "method": "POST",
          "output_encoding": "json",
          "backend": [
            {
              "url_pattern": "/api/users",
              "encoding": "json",
              "host": ["http://user-service:4021"],
              "method": "POST",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-users-create",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/auth/register",
          "method": "POST",
          "output_encoding": "json",
          "input_headers": ["Content-Type"],
          "backend": [
            {
              "url_pattern": "/auth/register",
              "encoding": "json",
              "host": ["http://auth-service:3002"],
              "method": "POST",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-auth-register",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/auth/login",
          "method": "POST",
          "output_encoding": "json",
          "input_headers": ["Content-Type"],
          "backend": [
            {
              "url_pattern": "/auth/login",
              "encoding": "json",
              "host": ["http://auth-service:3002"],
              "method": "POST",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-auth-login",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/auth/me",
          "method": "GET",
          "output_encoding": "json",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/auth/me",
              "encoding": "json",
              "host": ["http://auth-service:3002"],
              "method": "GET",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-auth-me",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/health",
          "method": "GET",
          "output_encoding": "json",
          "backend": [
            {
              "url_pattern": "/health",
              "encoding": "json",
              "host": ["http://user-service:4021"],
              "method": "GET",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-health",
                  "log_status_change": true
                }
              }
            }
          ]
        },

        {
          "endpoint": "/api/cart/health",
          "method": "GET",
          "output_encoding": "json",
          "backend": [
            {
              "url_pattern": "/cart/health",
              "encoding": "json",
              "host": ["http://cart-service:4022"],
              "method": "GET",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-cart-health",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/api/cart",
          "method": "GET",
          "output_encoding": "no-op",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/cart",
              "encoding": "no-op",
              "host": ["http://cart-service:4022"],
              "method": "GET",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-cart-get",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/api/cart/items",
          "method": "POST",
          "output_encoding": "no-op",
          "input_headers": ["Authorization", "Content-Type"],
          "backend": [
            {
              "url_pattern": "/cart/items",
              "encoding": "no-op",
              "host": ["http://cart-service:4022"],
              "method": "POST",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-cart-add",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/api/cart/items/{product_id}",
          "method": "PATCH",
          "output_encoding": "no-op",
          "input_headers": ["Authorization", "Content-Type"],
          "backend": [
            {
              "url_pattern": "/cart/items/{product_id}",
              "encoding": "no-op",
              "host": ["http://cart-service:4022"],
              "method": "PATCH",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-cart-patch",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/api/cart/items/{product_id}",
          "method": "DELETE",
          "output_encoding": "no-op",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/cart/items/{product_id}",
              "encoding": "no-op",
              "host": ["http://cart-service:4022"],
              "method": "DELETE",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-cart-delete-item",
                  "log_status_change": true
                }
              }
            }
          ]
        },
        {
          "endpoint": "/api/cart",
          "method": "DELETE",
          "output_encoding": "no-op",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/cart",
              "encoding": "no-op",
              "host": ["http://cart-service:4022"],
              "method": "DELETE",
              "extra_config": {
                "qos/circuit-breaker": {
                  "interval": 30,
                  "timeout": 10,
                  "max_errors": 3,
                  "name": "cb-cart-clear",
                  "log_status_change": true
                }
              }
            }
          ]
        }
      ]
    }
